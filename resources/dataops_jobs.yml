# =============================================================================
# Databricks Job Definitions — DataOps Demo
# =============================================================================
# Jobs define WHAT runs on Databricks and WHEN.
#
# We define TWO jobs:
#   1. pipeline_job  — the main data pipeline (runs daily in production)
#   2. test_job      — data quality tests (runs during CI/CD to validate changes)
#
# The CI/CD pipeline (GitHub Actions) uses test_job to validate code changes
# BEFORE promoting them to production. This is the core DataOps pattern:
#   "Test your data pipelines on the platform, not just locally."
# =============================================================================

resources:
  jobs:

    # -------------------------------------------------------------------------
    # Main Pipeline Job — runs the data pipeline in production
    # -------------------------------------------------------------------------
    pipeline_job:
      name: dataops_demo_pipeline_30_04_2026

      tasks:
        - task_key: run_pipeline
          notebook_task:
            notebook_path: ../notebooks/main_pipeline.py
        - task_key: run_pipeline_2
          notebook_task:
            notebook_path: ../notebooks/main_pipeline.py
        - task_key: run_pipeline_3
          depends_on:
            - task_key: run_pipeline
            - task_key: run_pipeline_2
          notebook_task:
            notebook_path: ../notebooks/main_pipeline.py

      # Uncomment to add a schedule in production:
      # trigger:
      #   periodic:
      #     interval: 1
      #     unit: DAYS

      # Uncomment and configure if your workspace doesn't have serverless:
      # job_clusters:
      #   - job_cluster_key: pipeline_cluster
      #     new_cluster:
      #       spark_version: 15.4.x-scala2.12
      #       node_type_id: i3.xlarge
      #       num_workers: 1

    # -------------------------------------------------------------------------
    # Test Job — runs data quality checks during CI/CD
    # -------------------------------------------------------------------------
    # This job is triggered by GitHub Actions after deploying to dev.
    # If it FAILS → CI/CD rolls back the deployment.
    # If it PASSES → CI/CD promotes the code to production.
    # -------------------------------------------------------------------------
    test_job:
      name: dataops_demo_tests

      tasks:
        # Step 1: Run the pipeline (create the data)
        - task_key: run_pipeline
          notebook_task:
            notebook_path: ../notebooks/main_pipeline.py

        # Step 2: Validate the data (depends on step 1)
        - task_key: run_tests
          depends_on:
            - task_key: run_pipeline
          notebook_task:
            notebook_path: ../notebooks/test_pipeline.py
